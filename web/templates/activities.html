{{define "title"}}Activities — Stride{{end}}
{{define "content"}}
<div class="overview-header">
    <div>
        <h1>Activities</h1>
        <p class="subtext">Browse, search, and filter every activity you have recorded on Strava.</p>
    </div>
    <span class="year-badge" id="act-badge">—</span>
</div>

<div class="stats-toolbar">
    <div class="filter-group">
        <input type="search" id="act-search" placeholder="Search activities…">
    </div>
    <div class="filter-group">
        <button class="period-btn" data-period="week">Week</button>
        <button class="period-btn" data-period="month">Month</button>
        <button class="period-btn" data-period="year">Year</button>
        <button class="period-btn" data-period="all">All time</button>
        <button class="period-btn" data-period="custom">Custom</button>
    </div>
    <div class="filter-group" id="date-range-group" style="display:none">
        <input type="date" id="date-from" title="From">
        <span class="date-sep">—</span>
        <input type="date" id="date-to" title="To">
    </div>
    <div class="filter-group">
        <select id="sport-filter">
            <option value="">All sports</option>
        </select>
    </div>
</div>

<div class="stat-grid">
    <div class="stat-card">
        <span class="stat-label">Activities</span>
        <span class="stat-value" id="s-count">—</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Distance</span>
        <span class="stat-value" id="s-dist">—</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Elevation</span>
        <span class="stat-value" id="s-elev">—</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Moving Time</span>
        <span class="stat-value" id="s-time">—</span>
    </div>
</div>

<section class="card">
    <table id="act-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Sport</th>
                <th>Distance</th>
                <th>Pace</th>
                <th>Time</th>
                <th>Elevation</th>
                <th>Date</th>
                <th title="0–100 score vs. your personal best pace for this sport type">Score <span class="info-tag" role="img" aria-label="0–100 score vs. your personal best pace for this sport type" title="0–100 score vs. your personal best pace for this sport type">?</span></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div class="pagination" id="act-pagination"></div>
</section>

<script src="/static/js/activities.js"></script>
{{end}}
