{{define "content"}}
<div class="overview-header">
    <h1>Stats</h1>
</div>

<div class="stats-toolbar">
    <div class="filter-group">
        <button class="period-btn" data-period="week">Week</button>
        <button class="period-btn" data-period="month">Month</button>
        <button class="period-btn" data-period="year">Year</button>
        <button class="period-btn" data-period="all">All time</button>
    </div>
    <div class="filter-group">
        <input type="date" id="date-from" title="From">
        <span class="date-sep">—</span>
        <input type="date" id="date-to" title="To">
    </div>
    <div class="filter-group">
        <select id="sport-filter">
            <option value="">All sports</option>
        </select>
    </div>
</div>

<div class="stat-grid" id="stat-cards">
    <div class="stat-card">
        <span class="stat-label">Activities</span>
        <span class="stat-value" id="s-count">—</span>
        <span id="s-count-delta"></span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Distance</span>
        <span class="stat-value" id="s-distance">—</span>
        <span id="s-distance-delta"></span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Elevation</span>
        <span class="stat-value" id="s-elevation">—</span>
        <span id="s-elevation-delta"></span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Moving Time</span>
        <span class="stat-value" id="s-time">—</span>
        <span id="s-time-delta"></span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Avg Distance</span>
        <span class="stat-value" id="s-avg">—</span>
        <span id="s-avg-delta"></span>
    </div>
</div>

<section class="card">
    <div class="card-header">
        <h2 id="chart-label">Distance over time</h2>
    </div>
    <div id="statsChart"></div>
</section>

<section class="card">
    <div class="card-header">
        <h2>By Sport</h2>
    </div>
    <div id="sport-bars" class="sport-bar-list"></div>
</section>

<section class="card">
    <div class="card-header">
        <h2>Training by Day &amp; Hour</h2>
    </div>
    <div id="day-hour-heatmap" style="overflow-x:auto;"></div>
</section>

<section class="card">
    <div class="card-header">
        <h2>Heart Rate Zones</h2>
        <div class="maxhr-control">
            <label for="max-hr-input">Max HR</label>
            <input type="number" id="max-hr-input" min="100" max="250" value="190">
            <span>bpm</span>
        </div>
    </div>
    <div id="hr-zones-chart"></div>
</section>

<script src="/static/js/stats.js"></script>
{{end}}
