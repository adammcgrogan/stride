{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Stride{{end}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <meta name="description" content="{{block "description" .}}Personal Strava activity tracker and training analytics.{{end}}">
    <script>
    (function(){
        const t = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = t;
    })();
    </script>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="/static/js/utils.js"></script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header class="mobile-header">
        <div class="sidebar-brand" aria-hidden="true">Str<em>i</em>de</div>
        <button class="hamburger" id="hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
    </header>
    <div class="nav-overlay" id="nav-overlay" aria-hidden="true"></div>
    <aside class="sidebar" id="sidebar" aria-label="Site navigation">
        <div class="sidebar-header">
            <div class="sidebar-brand" aria-hidden="true">Str<em>i</em>de</div>
            <button class="sidebar-close" id="sidebar-close" aria-label="Close navigation menu">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <nav aria-label="Primary">
            <a href="/" class="nav-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
                </svg>
                Overview
            </a>
            <a href="/activities" class="nav-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                    <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
                    <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                </svg>
                Activities
            </a>
            <a href="/stats" class="nav-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                </svg>
                Stats
            </a>
            <div class="nav-sep" aria-hidden="true"></div>
            <a href="/goals" class="nav-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
                </svg>
                Goals
            </a>
            <a href="/predict" class="nav-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
                    <line x1="4" y1="22" x2="4" y2="15"/>
                </svg>
                Predict
            </a>
            <a href="/fitness" class="nav-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
                </svg>
                Fitness
            </a>
            <div class="nav-sep" aria-hidden="true"></div>
            <a href="/map" class="nav-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
                    <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
                </svg>
                Map
            </a>
            <a href="/records" class="nav-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
                </svg>
                Records
            </a>
        </nav>
        <div class="sync-section">
            <span class="sync-label">Last updated:
                <span id="sync-status"
                      aria-live="polite"
                      aria-atomic="true"
                      hx-get="/api/sync-status"
                      hx-trigger="load, refresh"
                      hx-swap="innerHTML">—</span>
            </span>
            <div class="sync-actions">
                <button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode" title="Toggle dark mode">
                    <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>
                <button class="units-toggle" id="units-toggle" aria-label="Switch to miles" title="Switch between kilometres and miles">km</button>
                <button class="sync-btn"
                        hx-post="/sync"
                        hx-swap="none"
                        hx-disabled-elt="this"
                        title="Pull latest activities from Strava"
                        hx-on::before-request="this.querySelector('.sync-btn-text').textContent='Syncing…'"
                        hx-on::after-request="this.querySelector('.sync-btn-text').textContent='Sync now'; if(event.detail.successful) htmx.trigger('#sync-status', 'refresh')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sync-icon">
                        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    <span class="sync-btn-text">Sync now</span>
                </button>
            </div>
        </div>
    </aside>
    <main id="main-content">
        {{template "content" .}}
    </main>
    <script>
    (function(){
        const path = location.pathname;
        document.querySelectorAll('.sidebar nav a').forEach(a => {
            const href = a.getAttribute('href');
            const isActive = href === '/' ? path === '/' : path.startsWith(href);
            if (isActive) {
                a.classList.add('active');
                a.setAttribute('aria-current', 'page');
            }
        });

        const themeToggle = document.getElementById('theme-toggle');
        function updateThemeLabel(theme) {
            themeToggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
        }
        updateThemeLabel(document.documentElement.dataset.theme);
        themeToggle.addEventListener('click', () => {
            const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.dataset.theme = next;
            localStorage.setItem('theme', next);
            updateThemeLabel(next);
        });

        const unitsToggle = document.getElementById('units-toggle');
        function updateUnitsLabel(units) {
            unitsToggle.textContent = units;
            unitsToggle.setAttribute('aria-label', units === 'km' ? 'Switch to miles' : 'Switch to kilometres');
        }
        updateUnitsLabel(localStorage.getItem('units') || 'km');
        unitsToggle.addEventListener('click', () => {
            const next = (localStorage.getItem('units') || 'km') === 'km' ? 'mi' : 'km';
            localStorage.setItem('units', next);
            updateUnitsLabel(next);
            applyUnits();
            if (typeof render === 'function') render();
        });

        applyUnits();

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('nav-overlay');
        const hamburger = document.getElementById('hamburger');
        const sidebarClose = document.getElementById('sidebar-close');

        function openNav() {
            sidebar.classList.add('open');
            overlay.classList.add('open');
            overlay.removeAttribute('aria-hidden');
            hamburger.setAttribute('aria-expanded', 'true');
            document.body.style.overflow = 'hidden';
            sidebarClose.focus();
        }
        function closeNav() {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
            overlay.setAttribute('aria-hidden', 'true');
            hamburger.setAttribute('aria-expanded', 'false');
            document.body.style.overflow = '';
        }

        hamburger.addEventListener('click', openNav);
        sidebarClose.addEventListener('click', closeNav);
        overlay.addEventListener('click', closeNav);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNav(); });
    })();
    </script>
</body>
</html>
{{end}}
