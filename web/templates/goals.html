{{define "content"}}
<div class="overview-header">
    <div>
        <h1>Goals</h1>
        <p class="subtext">Track your progress across any metric, period, and sport.</p>
    </div>
    <button class="goal-fab" id="goal-fab-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Goal
    </button>
</div>

<div id="active-section">
    <div class="goals-section-label">Active</div>
    <div id="active-grid" class="goals-grid"></div>
    <p id="active-empty" class="goals-empty-note" style="display:none">No active goals yet. Hit <strong>Add Goal</strong> to create one.</p>
</div>

<div id="completed-section" style="display:none">
    <div class="goals-section-label">Completed</div>
    <div id="completed-grid" class="goals-grid"></div>
</div>

<!-- Drawer overlay -->
<div class="goal-drawer-overlay" id="goal-drawer-overlay"></div>

<!-- Drawer -->
<div class="goal-drawer" id="goal-drawer" role="dialog" aria-modal="true" aria-label="Add Goal">
    <div class="goal-drawer-header">
        <h2>New Goal</h2>
        <button class="goal-drawer-close" id="goal-drawer-close" aria-label="Close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>

    <form class="goal-form" method="POST" action="/goals">
        <div class="goal-form-row">
            <div class="goal-field goal-field--title">
                <label for="f-title">Title</label>
                <input type="text" id="f-title" name="title" placeholder="e.g. Run 1000 km this year" required maxlength="100">
            </div>
            <div class="goal-field">
                <label for="f-period">Period</label>
                <select id="f-period" name="period" required>
                    <option value="week">Weekly</option>
                    <option value="month">Monthly</option>
                    <option value="year" selected>Yearly</option>
                    <option value="all">All Time</option>
                </select>
            </div>
            <div class="goal-field">
                <label for="f-metric">Metric</label>
                <select id="f-metric" name="metric" required>
                    <option value="distance">Distance</option>
                    <option value="moving_time">Moving Time</option>
                    <option value="elevation">Elevation</option>
                    <option value="count">Activities</option>
                    <option value="kilojoules">Kilojoules</option>
                    <option value="suffer_score">Suffer Score</option>
                </select>
            </div>
            <div class="goal-field">
                <label for="f-sport">Sport</label>
                <select id="f-sport" name="sport_type">
                    <option value="">All Sports</option>
                    {{range .Sports}}
                    <option value="{{.SportType}}">{{.SportType}}</option>
                    {{end}}
                </select>
            </div>
            <div class="goal-field">
                <label for="f-target">Target <span id="unit-label" class="unit-label">km</span></label>
                <input type="number" id="f-target" name="target" min="0" step="any" placeholder="1000" required>
            </div>
        </div>
        <button type="submit" class="goal-submit-btn">Save Goal</button>
    </form>
</div>

<script>const GOALS = {{.GoalsJSON}};</script>
<script src="/static/js/goals.js"></script>
{{end}}
