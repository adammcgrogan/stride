{{define "share_layout"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "share_title" .}}Activity — Stride{{end}}</title>
    <meta property="og:title" content="{{.Name}} — Stride">
    <meta property="og:description" content="{{.SportType}} by {{fullName .AthleteFirstname .AthleteLastname}}">
    <meta property="og:image" content="{{.BaseURL}}/share/{{.ShareToken}}/card.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="{{.BaseURL}}/share/{{.ShareToken}}/card.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
    (function(){
        const t = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = t;
    })();
    </script>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="/static/js/utils.js"></script>
    <style>
        body   { display: block; min-height: 100vh; }
        main   { margin-left: 0; padding: 0; }

        .sp-root {
            max-width: 680px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .sp-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .sp-brand {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--text);
            text-decoration: none;
        }
        .sp-brand em { font-style: normal; color: var(--accent); }

        .sp-strava-link {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            border: 1px solid rgba(252,76,2,.35);
            padding: 0.3rem 0.75rem;
            border-radius: var(--radius-full);
            transition: background .15s, color .15s;
        }
        .sp-strava-link:hover { background: var(--accent); color: #fff; text-decoration: none; }

        .sp-activity-header { display: flex; flex-direction: column; gap: 0.3rem; }

        .sp-athlete {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: -0.005em;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .sp-activity-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.2;
        }

        .sp-meta {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .sp-meta-date {
            font-size: 0.82rem;
            color: var(--muted);
        }

        .sp-footer {
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .sp-footer a { color: var(--muted); text-decoration: underline; }
        .sp-footer a:hover { color: var(--text); }

        .sp-footer-brand {
            font-weight: 600;
            color: var(--text-2);
            text-decoration: none;
        }
        .sp-footer-brand:hover { color: var(--accent); text-decoration: none; }
        .sp-footer-brand em { font-style: normal; color: var(--accent); }
    </style>
</head>
<body>
    <div class="sp-root">
        {{template "share_content" .}}
        <div class="sp-footer">
            <a href="/" class="sp-footer-brand">Str<em>i</em>de</a>
            <span>Shared activity · <a href="https://www.strava.com/activities/{{.ID}}" target="_blank" rel="noopener">View on Strava</a></span>
        </div>
    </div>
    <script>applyUnits();</script>
    <script>
    (function(){
        const t = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        const btn = document.createElement('button');
        btn.style.cssText = 'position:fixed;bottom:1.25rem;right:1.25rem;background:rgba(var(--sidebar,13,15,20),.9);border:1px solid rgba(255,255,255,.08);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#8b95a3;backdrop-filter:blur(4px);z-index:10';
        btn.innerHTML = `<svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
        btn.addEventListener('click', () => {
            const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.dataset.theme = next;
            localStorage.setItem('theme', next);
        });
        document.body.appendChild(btn);
    })();
    </script>
</body>
</html>
{{end}}
